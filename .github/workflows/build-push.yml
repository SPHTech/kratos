name: Build and Push Image to ECR
on:
  push:

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"
      
      - run: go version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::345224838874:role/github-actions/gha-role-idpf-kratos-dev
          role-skip-session-tagging: true
          role-session-name: gh-actions
          aws-region: ap-southeast-1

      - name: Debug log
        run: |
          docker images

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
  
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Build kratos binary
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o kratos .
    
      - name: Build Docker Image
        run: |
          docker build -f .docker/Dockerfile-alpine -t ${{ steps.login-ecr.outputs.registry }}/idpf/kratos:latest .
      
      - name: Push Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/idpf/kratos:latest
